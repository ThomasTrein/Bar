{% extends "base_admin.html" %}
{% block title %}Instellingen — KSA Bar Admin{% endblock %}
{% block content %}
<div class="admin-page-header">
  <h1>Instellingen</h1>
</div>

{% if opgeslagen %}<div class="alert alert-success">Instellingen opgeslagen.</div>{% endif %}

<form method="POST" class="settings-form">
  <div class="form-group">
    <label>Nieuw admin wachtwoord</label>
    <input type="password" name="admin_password" class="form-input" placeholder="(leeg = niet wijzigen)">
  </div>
  <div class="form-group">
    <label>Deur time-out (seconden)</label>
    <input type="number" name="deur_timeout_sec" value="{{ settings.get('deur_timeout_sec', 120) }}"
           min="10" max="600" class="form-input">
  </div>
  <div class="form-group">
    <label>Screensaver time-out (minuten)</label>
    <input type="number" name="screensaver_timeout_min" value="{{ settings.get('screensaver_timeout_min', 2) }}"
           min="1" max="60" class="form-input">
  </div>
  <div class="form-group">
    <label>Admin auto-logout (minuten)</label>
    <input type="number" name="admin_logout_min" value="{{ settings.get('admin_logout_min', 10) }}"
           min="1" max="120" class="form-input">
  </div>
  <div class="form-group">
    <label>Video bewaarperiode (dagen)</label>
    <input type="number" name="video_bewaar_dagen" value="{{ settings.get('video_bewaar_dagen', 40) }}"
           min="1" max="365" class="form-input">
  </div>
  <div class="form-group">
    <label>Prijs tonen op kiosk</label>
    <select name="prijs_tonen" class="form-input">
      <option value="1" {% if settings.get('prijs_tonen') not in ('false','0','') %}selected{% endif %}>Ja</option>
      <option value="0" {% if settings.get('prijs_tonen') in ('false','0') %}selected{% endif %}>Nee</option>
    </select>
  </div>
  <button type="submit" class="btn-primary">Opslaan</button>
</form>

<hr>
<div class="form-group">
  <a href="{{ url_for('admin.backup_download') }}" class="btn-secondary">Database backup downloaden</a>
</div>
{% endblock %}
