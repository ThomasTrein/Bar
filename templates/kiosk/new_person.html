{% extends "base_kiosk.html" %}
{% block title %}Nieuw persoon — KSA Bar{% endblock %}
{% block content %}
<div class="page-screen">
  <div class="page-header">
    <a href="{{ url_for('kiosk.home') if next == 'home' else url_for('kiosk.bestelling_naam') }}" class="btn-back">← Terug</a>
    <h1>➕ Nieuwe persoon aanmaken</h1>
  </div>

  <form method="POST" action="{{ url_for('kiosk.persoon_nieuw') }}"
        enctype="multipart/form-data" class="form-card">
    <input type="hidden" name="next" value="{{ next or 'bestelling_naam' }}">
    <div class="form-group">
      <label>Voornaam *</label>
      <input type="text" name="voornaam" required class="form-input" autofocus>
    </div>
    <div class="form-group">
      <label>Achternaam</label>
      <input type="text" name="achternaam" class="form-input">
    </div>
    <div class="form-group">
      <label>Bijnaam / Roepnaam</label>
      <input type="text" name="bijnaam" class="form-input">
    </div>
    <div class="form-group">
      <label>Foto (optioneel)</label>
      <input type="file" name="foto" accept="image/*" class="form-file-input"
             capture="user">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">✅ Aanmaken</button>
      <a href="{{ url_for('kiosk.home') if next == 'home' else url_for('kiosk.bestelling_naam') }}" class="btn-secondary">Annuleren</a>
    </div>
  </form>
</div>
{% endblock %}
