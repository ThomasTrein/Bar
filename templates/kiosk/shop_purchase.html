{% extends "base_kiosk.html" %}
{% block title %}Winkelaankoop — KSA Bar{% endblock %}
{% block content %}
<div class="page-screen">
  <div class="page-header">
    <a href="{{ url_for('kiosk.winkelaankoop') }}" class="btn-back">← Terug</a>
    <h1>🛒 Winkelaankoop — {{ persoon.bijnaam or persoon.voornaam }}</h1>
  </div>

  <form method="POST" action="{{ url_for('kiosk.winkelaankoop_bevestigen') }}" class="shop-form">
    <input type="hidden" name="person_id" value="{{ persoon.id }}">

    <h2 style="padding:16px 16px 8px">Welke producten zijn aangekocht?</h2>
    {% for p in producten %}
    <div class="shop-row">
      <div class="shop-naam">{{ p.naam }}</div>
      <label class="shop-label">Aantal</label>
      <input type="number" name="qty_{{ p.id }}" value="0" min="0" class="shop-qty">
      <label class="shop-label">Prijs/stuk (€)</label>
      <input type="number" name="prijs_{{ p.id }}" value="0.00"
             min="0" step="0.01" class="shop-prijs">
    </div>
    {% endfor %}

    <div class="bottom-bar">
      <button type="submit" class="btn-confirm">Aankoop registreren</button>
      <a href="{{ url_for('kiosk.home') }}" class="btn-danger">Annuleren</a>
    </div>
  </form>
</div>
{% endblock %}
